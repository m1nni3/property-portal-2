name = "property-portal-2"
main = "src/index.ts"
compatibility_date = "2026-03-01"

# Secrets are stored in .dev.vars locally and via `wrangler secret put` in production.
# Do NOT put real tokens here.
[vars]
# Add non-sensitive vars here, e.g.: APP_ENV = "production"

[triggers]
crons = [
  "0 0 * * *",   # daily midnight  — mark overdue invoices
  "0 6 * * *",   # daily 06:00     — upcoming invoice alerts
  "0 7 * * *",   # daily 07:00     — missing document check
  "0 1 1 * *",   # 1st of month    — journal batch
]

[dev]
port = 8787

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "property-portal-2-db"
database_id = "deba0b10-9126-4ac0-bc6c-7982dfb8ca9d"
migrations_dir = "d1/migrations"

# R2 Bucket binding
[[r2_buckets]]
binding = "R2"
bucket_name = "property-files"
