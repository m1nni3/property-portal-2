name = "property-portal-2"
main = "src/index.ts"
compatibility_date = "2026-03-01"

# Cron triggers (matches schedule switch in src/scheduled.ts)

[vars]
CF_API_TOKEN = "cfoat_gVGIJMM2MZ5tmZhPaN-lQ-x_bjrp0gyuDpmxOdLqxEs.RoGAz6ivfqCF-2RCjB3knGLyMBM_APZvHMBczmPH7nY"
[triggers]
crons = [
  "0 0 * * *",   # daily midnight  — mark overdue invoices
  "0 6 * * *",   # daily 06:00     — upcoming invoice alerts
  "0 7 * * *",   # daily 07:00     — missing document check
  "0 1 1 * *",   # 1st of month    — journal batch
]

# Cloudflare Pages environment variables if deploying to Pages
# [site]
# bucket = "./public"

# Development mode routes, etc.
[dev]
port = 8787

# Production environment configuration
[production]
# routes = [{ pattern = "example.com/api/*", zone_name = "example.com" }] # Example route

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "property_db"
database_id = "364a59cc-c784-4d2d-9b1c-5e464fbf292c"

# R2 Bucket binding
[[r2_buckets]]
binding = "R2"
bucket_name = "property-files" # Bucket name for storing files

# KV Namespace binding (optional for caching)
# [[kv_namespaces]]
# binding = "CACHE"
# preview_id = "YOUR_KV_PREVIEW_ID"
# account_id = "YOUR_CF_ACCOUNT"

pages_build_output_dir = ".vercel/output/static"
